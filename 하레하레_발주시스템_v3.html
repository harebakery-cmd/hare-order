<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#3b5bdb">
<title>하레하레 발주 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f6fa;
  --surface: #fff;
  --surface2: #f0f1f5;
  --border: #e0e3ec;
  --accent: #3b5bdb;
  --accent-light: #eef2ff;
  --text: #1a1d2e;
  --text-dim: #6c757d;
  --green: #2f9e44;
  --green-bg: #ebfbee;
  --red: #e03131;
  --yellow-bg: #fff9db;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { margin: 0; padding: 0; }
body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; margin: 0; padding: 0; }

.header {
  background: var(--surface); border-bottom: 2px solid var(--border);
  padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 300; box-shadow: 0 2px 8px rgba(0,0,0,0.07); height: 58px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.logo { width: 36px; height: 36px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 15px; color: #fff; }
.header-title { font-size: 15px; font-weight: 800; }
.header-sub { font-size: 10px; color: var(--text-dim); font-family: 'DM Mono', monospace; margin-top: 1px; }
.date-input { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: 13px; color: var(--text); font-family: 'DM Mono', monospace; }
.date-input:focus { outline: none; border-color: var(--accent); }

.tabs-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 0 20px; display: flex; align-items: center;
  overflow-x: auto; position: sticky; top: 58px; z-index: 200;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.tabs-bar::-webkit-scrollbar { height: 3px; }
.tabs-bar::-webkit-scrollbar-thumb { background: var(--border); }
.tab-btn {
  padding: 14px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
  border: none; background: transparent; color: var(--text-dim);
  border-bottom: 3px solid transparent; white-space: nowrap;
  transition: all 0.15s; font-family: 'Noto Sans KR', sans-serif; flex-shrink: 0;
}
.tab-btn:hover { color: var(--accent); background: var(--accent-light); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 800; }
.tab-btn.t-summary { color: #c92a2a; font-weight: 800; }
.tab-btn.t-summary.active { border-bottom-color: #c92a2a; color: #c92a2a; }
.tab-btn.t-admin { color: #7950f2; }
.tab-btn.t-admin.active { border-bottom-color: #7950f2; color: #7950f2; }

@keyframes flashUpdate {
  0% { background: rgba(59,91,219,0.15); }
  100% { background: transparent; }
}
.row-flash { animation: flashUpdate 0.8s ease-out; }

.main { max-width: 1080px; margin: 0 auto; padding: 20px 18px; }

.action-bar {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 13px 18px; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.notice-bar {
  background: var(--yellow-bg); border: 1.5px solid #ffd43b; border-radius: 10px;
  padding: 10px 18px; margin-bottom: 16px; font-size: 12px; font-weight: 700; color: #7c4f0a;
}

.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: auto; box-shadow: 0 1px 4px rgba(0,0,0,0.05); margin-bottom: 16px; }
.order-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 13px; }
.order-table thead tr { background: var(--surface2); }
.order-table th {
  padding: 10px 12px; font-size: 11px; font-weight: 700; color: var(--text-dim);
  text-align: center; border-bottom: 2px solid var(--border); white-space: nowrap;
}
.order-table th:first-child {
  text-align: left; padding-left: 16px; position: sticky; left: 0;
  background: var(--surface2); z-index: 5; min-width: 130px;
  box-shadow: 2px 0 5px rgba(0,0,0,0.06);
}
.order-table th.th-total { color: var(--accent); font-weight: 800; }
.order-table td { padding: 8px 12px; text-align: center; border-bottom: 1px solid #f0f2f7; }
.order-table td:first-child {
  text-align: left; padding-left: 16px; font-weight: 500;
  position: sticky; left: 0; background: var(--surface); z-index: 2;
  min-width: 130px; box-shadow: 2px 0 5px rgba(0,0,0,0.06);
}
.order-table tbody tr:hover { background: #fafbff; }
.order-table tbody tr:hover td:first-child { background: #fafbff; }
.order-table tbody tr:last-child td { border-bottom: none; }
.cat-row td {
  background: var(--surface2) !important; font-size: 11px; font-weight: 800;
  color: var(--text-dim); padding: 6px 16px !important; text-align: left !important;
  border-bottom: 1px solid var(--border) !important; letter-spacing: 0.3px;
  cursor: pointer; user-select: none;
}
.cat-row td:first-child { box-shadow: 2px 0 5px rgba(0,0,0,0.06); }
.cat-row:hover td { background: #e8eaf0 !important; }
.cat-toggle { float: right; font-size: 10px; opacity: 0.5; transition: transform 0.2s; display: inline-block; }
.cat-row.collapsed .cat-toggle { transform: rotate(-90deg); }
.cat-row.collapsed + tr:not(.cat-row),
tr.cat-hidden { display: none; }

.num-input {
  width: 68px; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 7px; padding: 5px 6px; font-size: 15px; font-weight: 600;
  color: var(--text); text-align: center; font-family: 'DM Mono', monospace; transition: all 0.15s;
}
.num-input:focus { outline: none; border-color: var(--accent); background: var(--accent-light); box-shadow: 0 0 0 3px rgba(59,91,219,0.1); }
.num-input::-webkit-inner-spin-button, .num-input::-webkit-outer-spin-button { -webkit-appearance: none; }

.cell-total { font-family: 'DM Mono', monospace; font-weight: 800; color: var(--accent); }
.cell-zero { color: #ced4da; }
.cell-has { font-weight: 600; }
.row-disabled td { color: #bbb !important; background: #f8f8f8 !important; }
.row-disabled td:first-child { color: #bbb !important; }
.row-disabled .cell-total { color: #ccc !important; }
.row-disabled td.cell-has { color: #bbb !important; font-weight: 400 !important; }

.summary-card {
  background: linear-gradient(135deg, #1e3a8a 0%, #3b5bdb 100%);
  border-radius: 14px; padding: 18px 24px; margin-bottom: 18px;
  color: #fff; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.summary-card h2 { font-size: 18px; font-weight: 900; }
.summary-card p { font-size: 11px; opacity: 0.75; margin-top: 3px; }
.locked-badge { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 5px 14px; font-size: 11px; font-weight: 700; }

.live-badge {
  background: rgba(47,158,68,0.2); border: 1px solid rgba(47,158,68,0.5);
  border-radius: 20px; padding: 5px 14px; font-size: 11px; font-weight: 700;
  color: #d3f9d8; display: flex; align-items: center; gap: 5px;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%; background: #69db7c;
  animation: livePulse 1.5s infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(0.8); }
}

.store-card {
  background: linear-gradient(135deg, #f8f9ff, #eef2ff);
  border: 1.5px solid #c5d2f6; border-radius: 14px;
  padding: 16px 22px; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.store-name { font-size: 20px; font-weight: 900; color: var(--accent); }

.btn { display: inline-flex; align-items: center; gap: 5px; padding: 8px 16px; border-radius: 9px; font-size: 12px; font-weight: 700; cursor: pointer; border: none; transition: all 0.18s; font-family: 'Noto Sans KR', sans-serif; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #2f4ac0; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(59,91,219,0.3); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: #fff5f5; color: var(--red); border: 1px solid #ffc9c9; }
.btn-danger:hover { background: #ffe3e3; }
.btn-green { background: var(--green-bg); color: var(--green); border: 1px solid #b2f2bb; }
.btn-green:hover { background: #d3f9d8; }
.btn-purple { background: #f3f0ff; color: #7950f2; border: 1px solid #d0bfff; }
.btn-purple:hover { background: #e5dbff; }

.admin-section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
.admin-section h3 { font-size: 13px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.admin-section h3::before { content: ''; width: 3px; height: 14px; background: #7950f2; border-radius: 2px; display: inline-block; }
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; min-height: 32px; }
.tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.tag .x { cursor: pointer; color: var(--red); font-weight: 900; font-size: 14px; line-height: 1; }
.tag .x:hover { opacity: 0.6; }
.input-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.text-input { flex: 1; min-width: 140px; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 13px; font-size: 13px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; }
.text-input:focus { outline: none; border-color: var(--accent); background: #fff; }
.sel-input { background: var(--surface2); border: 1.5px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 12px; color: var(--text); font-family: 'Noto Sans KR', sans-serif; }
.sel-input:focus { outline: none; border-color: var(--accent); }
.field-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.field-label { font-size: 12px; color: var(--text-dim); font-weight: 600; white-space: nowrap; }

.drag-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; min-height: 32px; }
.drag-item {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 9px; padding: 7px 12px;
  font-size: 13px; font-weight: 500; cursor: default;
  transition: box-shadow 0.15s, background 0.15s;
  user-select: none;
}
.drag-item:hover { background: var(--accent-light); border-color: #c5d2f6; }
.drag-item.dragging { opacity: 0.3; border-style: dashed; }
.drag-item.drag-over { background: var(--accent-light); border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,91,219,0.2); }
.drag-handle { cursor: grab; color: #adb5bd; font-size: 16px; line-height: 1; flex-shrink: 0; padding: 0 2px; }
.drag-handle:active { cursor: grabbing; }
.drag-handle:hover { color: var(--accent); }
.drag-item-name { flex: 1; }
.drag-item .x { cursor: pointer; color: var(--red); font-weight: 900; font-size: 15px; line-height: 1; flex-shrink: 0; }
.drag-item .x:hover { opacity: 0.6; }
.drag-hint { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }

.admin-save-footer {
  background: linear-gradient(135deg, #f3f0ff, #ede9fe);
  border: 2px solid #b197fc; border-radius: 14px;
  padding: 20px 24px; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px;
}
.save-desc { font-size: 13px; color: #5f3dc4; font-weight: 700; }
.save-desc small { font-size: 11px; color: #7950f2; font-weight: 400; display: block; margin-top: 3px; }

.toast-wrap { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 11px 18px; font-size: 13px; font-weight: 600; animation: toastIn 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
.toast.success { border-color: #b2f2bb; background: var(--green-bg); color: var(--green); }
.toast.error { border-color: #ffc9c9; background: #fff5f5; color: var(--red); }
.confirm-bar {
  background: linear-gradient(135deg, #fff0f0, #ffe3e3);
  border: 2px solid #ffa8a8; border-radius: 12px;
  padding: 16px 20px; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.confirm-bar .cb-title { font-size: 13px; font-weight: 800; color: #c92a2a; }
.confirm-bar .cb-desc  { font-size: 11px; color: #e03131; margin-top: 2px; }
.confirm-bar .cb-row   { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.submit-bar {
  position: sticky; bottom: 0; z-index: 100;
  background: linear-gradient(135deg, #1e3a8a, #3b5bdb);
  border-radius: 14px; padding: 16px 22px; margin-top: 4px; margin-bottom: 8px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  box-shadow: 0 -4px 20px rgba(59,91,219,0.25);
}
.sb-title { font-size: 14px; font-weight: 800; color: #fff; }
.sb-desc  { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 3px; }
.btn-submit {
  background: #fff; color: var(--accent); font-size: 14px; font-weight: 900;
  padding: 11px 28px; border-radius: 10px; border: none; cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,0,0,0.15); transition: all 0.18s;
  font-family: 'Noto Sans KR', sans-serif;
}
.btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
.btn-submit:active { transform: translateY(0); }

@media (max-width: 600px) {
  .submit-bar { border-radius: 10px; padding: 13px 16px; }
  .sb-title { font-size: 13px; }
  .btn-submit { font-size: 13px; padding: 10px 20px; }
}

@keyframes toastIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

@media (max-width: 600px) {
  .header { padding: 0 10px; height: 52px; }
  .logo { width: 30px; height: 30px; font-size: 12px; border-radius: 8px; }
  .header-title { font-size: 13px; }
  .header-sub { font-size: 9px; }
  #fbStatus { font-size: 9px !important; }
  .date-input { padding: 5px 8px; font-size: 12px; }
  .tabs-bar { padding: 0 4px; top: 52px; }
  .tab-btn { padding: 10px 12px; font-size: 11px; }
  .main { padding: 10px 8px; max-width: 100%; }
  .table-wrap { border-radius: 10px; }
  .order-table.store-table { display: block; }
  .order-table.store-table thead { display: none; }
  .order-table.store-table tbody { display: flex; flex-direction: column; gap: 0; }
  .order-table.store-table tbody tr {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid #f0f2f7;
  }
  .order-table.store-table tbody tr.cat-row {
    background: var(--surface2) !important;
    padding: 7px 14px !important;
    display: block !important;
  }
  .order-table.store-table tbody tr.cat-row td {
    font-size: 11px !important; font-weight: 800 !important;
    color: var(--text-dim) !important; text-align: left !important;
    padding: 0 !important; box-shadow: none !important;
    background: transparent !important;
  }
  .order-table.store-table tbody tr td:first-child {
    position: static !important; box-shadow: none !important;
    min-width: unset !important; font-size: 13px !important;
    flex: 1; padding: 0 !important; background: transparent !important;
  }
  .order-table.store-table tbody tr td:last-child { padding: 0 !important; }
  .order-table.store-table tbody tr:hover { background: #fafbff; }
  .num-input {
    width: 72px; height: 38px; font-size: 16px !important;
    border-radius: 10px; padding: 6px 8px;
    -webkit-text-size-adjust: none;
  }
  .order-table th { padding: 8px 6px; font-size: 10px; }
  .order-table td { padding: 7px 6px; font-size: 12px; }
  .order-table th:first-child { min-width: 90px; padding-left: 10px; }
  .order-table td:first-child { min-width: 90px; padding-left: 10px; font-size: 12px; }
  .summary-card { padding: 14px 16px; border-radius: 10px; }
  .summary-card h2 { font-size: 15px; }
  .summary-card p { font-size: 10px; }
  .store-card { padding: 12px 14px; border-radius: 10px; gap: 8px; }
  .store-name { font-size: 17px; }
  .action-bar { padding: 10px 12px; border-radius: 10px; }
  .notice-bar { padding: 8px 12px; font-size: 11px; border-radius: 8px; }
  .btn { padding: 8px 12px; font-size: 11px; border-radius: 8px; }
  .confirm-bar { padding: 12px 14px; border-radius: 10px; }
  .confirm-bar .cb-title { font-size: 12px; }
  .confirm-bar .cb-desc { font-size: 10px; }
  .admin-section { padding: 16px 14px; border-radius: 10px; }
  .admin-section h3 { font-size: 12px; }
  .admin-save-footer { padding: 14px 16px; border-radius: 10px; }
  .toast-wrap { bottom: 16px; right: 10px; left: 10px; }
  .toast { font-size: 12px; padding: 10px 14px; text-align: center; }
  .input-row { flex-direction: column; }
  .input-row .text-input { min-width: unset; }
  .locked-badge { padding: 4px 10px; font-size: 10px; }
  .live-badge { padding: 4px 10px; font-size: 10px; }
}

@media (hover: none) and (pointer: coarse) {
  .btn { min-height: 40px; }
  .tab-btn { min-height: 44px; }
  .num-input { min-height: 40px; }
  .btn-primary:hover { transform: none; box-shadow: none; }
  .order-table tbody tr:hover { background: transparent; }
  .num-input { font-size: 16px !important; }
  .text-input { font-size: 16px !important; }
  .sel-input { font-size: 16px !important; }
  .date-input { font-size: 16px !important; }
}

@supports (padding-bottom: env(safe-area-inset-bottom)) {
  body { padding-bottom: env(safe-area-inset-bottom); }
  .toast-wrap { bottom: calc(16px + env(safe-area-inset-bottom)); }
}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<body>

<div class="header">
  <div class="header-left">
    <div class="logo">발주</div>
    <div>
      <div class="header-title">하레하레 발주 시스템</div>
      <div class="header-sub" id="headerSub">로딩중...</div>
      <div id="fbStatus" style="font-size:10px;font-family:'DM Mono',monospace;margin-top:1px;color:#adb5bd">⚡ 연결중...</div>
    </div>
  </div>
  <input type="date" class="date-input" id="globalDate" onchange="onDateChange()">
</div>

<div class="tabs-bar" id="tabsBar"></div>
<div class="main" id="mainContent"></div>
<div class="toast-wrap" id="toastWrap"></div>

<script>
// ══════════════════════════════════════════════
//  FIREBASE 초기화
// ══════════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyCGzugccTwvFUcHzwumkPca0erVjXznKaA",
  authDomain: "hare-order.firebaseapp.com",
  databaseURL: "https://hare-order-default-rtdb.firebaseio.com",
  projectId: "hare-order",
  storageBucket: "hare-order.firebasestorage.app",
  messagingSenderId: "119764747020",
  appId: "1:119764747020:web:4b39a5f72c786b52e37f29"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ══════════════════════════════════════════════
//  날짜 키 — 총 확인 탭은 항상 어제, 점포 탭은 오늘
// ══════════════════════════════════════════════
function getDateKey() {
  if (currentTab === '__summary__') {
    // 총 확인 탭: 항상 어제 날짜
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return d.toISOString().slice(0, 10);
  }
  // 점포 탭 / 기타: date input 기준 (오늘)
  return document.getElementById('globalDate')?.value || new Date().toISOString().slice(0, 10);
}

function qtyRef() { return db.ref('qty/' + getDateKey()); }

function safeKey(p) {
  return p.replace(/[.#$\[\]\/]/g, '_');
}

function getQ(sid, p)    { return qty[sid]?.[safeKey(p)] ?? 0; }
function getDraft(sid, p){ return draft[sid]?.[safeKey(p)] ?? null; }
function setDraft(sid, p, v) {
  if (!draft[sid]) draft[sid] = {};
  const n = parseInt(v);
  const k = safeKey(p);
  draft[sid][k] = (isNaN(n) || n < 0) ? 0 : n;
  updateSubmitBar(sid);
}

function fbSubmitStore(sid) {
  const data = {};
  document.querySelectorAll(`.num-input[data-sid="${sid}"]`).forEach(inp => {
    const p = inp.getAttribute('data-prod');
    const n = parseInt(inp.value) || 0;
    if (n > 0) data[safeKey(p)] = n;
  });
  return qtyRef().child(sid).set(Object.keys(data).length ? data : null);
}

let qtyListener = null;

function subscribeQty() {
  if (qtyListener) { qtyRef().off('value', qtyListener); }
  qtyListener = qtyRef().on('value', snap => {
    qty = snap.val() || {};
    if (currentTab === '__summary__') {
      updateSummaryTable();
    }
  });
}

function updateSummaryTable() {
  const tbody = document.getElementById('summaryTbody');
  if (!tbody) {
    renderMain();
    return;
  }

  const rows = tbody.querySelectorAll('tr[data-prod]');
  rows.forEach(row => {
    const p = row.getAttribute('data-prod');
    let total = 0;
    stores.forEach((s, i) => {
      const q = getQ(s.id, p);
      total += q;
      const cell = row.querySelector(`td[data-sid="${s.id}"]`);
      if (cell) {
        const prev = cell.getAttribute('data-prev') || '0';
        const cur = String(q);
        if (prev !== cur) {
          cell.textContent = q > 0 ? q : '-';
          cell.className = q > 0 ? 'cell-has' : 'cell-zero';
          if (isDisabled(s.id, p)) cell.style.cssText = 'text-decoration:line-through;opacity:0.4';
          cell.setAttribute('data-prev', cur);
          row.classList.remove('row-flash');
          void row.offsetWidth;
          row.classList.add('row-flash');
        }
      }
    });
    const totalCell = row.querySelector('td.cell-total');
    if (totalCell) {
      totalCell.textContent = total > 0 ? total : '-';
    }
    if (!summaryShowAll) {
      row.style.display = total === 0 ? 'none' : '';
    } else {
      row.style.display = '';
    }
  });

  updateCatRowVisibility(tbody);
}

function updateCatRowVisibility(tbody) {
  const catRows = tbody.querySelectorAll('tr.cat-row');
  catRows.forEach(catRow => {
    const cat = catRow.getAttribute('data-cat');
    if (!cat) return;
    let hasVisible = false;
    let sibling = catRow.nextElementSibling;
    while (sibling && !sibling.classList.contains('cat-row')) {
      if (sibling.style.display !== 'none') { hasVisible = true; break; }
      sibling = sibling.nextElementSibling;
    }
    catRow.style.display = (!summaryShowAll && !hasVisible) ? 'none' : '';
  });
}

// config 실시간 구독
let configListener = null;
function subscribeConfig(callback) {
  if (configListener) { db.ref('config').off('value', configListener); }
  let firstLoad = true;
  configListener = db.ref('config').on('value', snap => {
    const cfg = snap.val();
    if (cfg) {
      if (cfg.stores)   stores   = cfg.stores;
      if (cfg.products) products = cfg.products;
      if (cfg.masterCatOrder && cfg.masterProds) {
        masterProducts = {};
        cfg.masterCatOrder.forEach(cat => {
          masterProducts[cat] = cfg.masterProds[cat] || [];
        });
      } else if (cfg.master) {
        masterProducts = cfg.master;
      } else {
        masterProducts = buildMasterFromProducts();
      }
      if (cfg.disabled) {
        disabled = {};
        Object.entries(cfg.disabled).forEach(([sid, arr]) => {
          disabled[sid] = {};
          (arr || []).forEach(p => { disabled[sid][p] = true; });
        });
      }
    } else {
      masterProducts = buildMasterFromProducts();
    }
    if (firstLoad) {
      firstLoad = false;
      if (callback) callback();
    } else {
      if (currentTab !== '__admin__') { buildTabs(); renderMain(); }
    }
  });
}

function fbResetQtyByCategories(catList) {
  const updates = {};
  stores.forEach(s => {
    catList.forEach(cat => {
      (masterProducts[cat] || []).forEach(p => {
        const k = safeKey(p);
        updates[`${s.id}/${k}`] = null;
      });
    });
  });
  qtyRef().update(updates);
}

let stores   = JSON.parse(JSON.stringify(DEFAULT_STORES));
let products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
let masterProducts = {};
let disabled = {};
let currentTab = '__summary__';
let qty = {};
let draft = {};

function isDisabled(sid, p) { return !!(disabled[sid] && disabled[sid][p]); }

function buildMasterFromProducts() {
  const master = {};
  stores.forEach(s => {
    Object.entries(products[s.id] || {}).forEach(([cat, prods]) => {
      if (!master[cat]) master[cat] = [];
      prods.forEach(p => { if (!master[cat].includes(p)) master[cat].push(p); });
    });
  });
  return master;
}

function init() {
  const d = new Date();
  document.getElementById('globalDate').value = d.toISOString().slice(0, 10);
  setHeaderSub();
  subscribeConfig(() => {
    buildTabs();
    subscribeQty();
  });
}

function setHeaderSub() {
  const v = document.getElementById('globalDate').value;
  const d = new Date(v + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('headerSub').textContent =
    `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
}

function onDateChange() {
  qty = {};
  draft = {};
  setHeaderSub();
  subscribeQty();
}

// ══════════════════════════════════════════════
//  TABS
// ══════════════════════════════════════════════
function buildTabs() {
  const bar = document.getElementById('tabsBar');
  let h = `<button class="tab-btn t-summary${currentTab==='__summary__'?' active':''}" onclick="switchTab('__summary__')">📋 총 확인</button>`;
  stores.forEach(s => {
    h += `<button class="tab-btn${currentTab===s.id?' active':''}" onclick="switchTab('${s.id}')">${s.label}</button>`;
  });
  h += `<button class="tab-btn t-admin${currentTab==='__admin__'?' active':''}" onclick="switchTab('__admin__')">⚙️ 설정</button>`;
  bar.innerHTML = h;
}

function switchTab(id) {
  currentTab = id;
  buildTabs();
  // 탭 전환 시 해당 날짜의 qty 재구독
  subscribeQty();
  renderMain();
}

// ══════════════════════════════════════════════
//  RENDER MAIN
// ══════════════════════════════════════════════
function renderMain() {
  const el = document.getElementById('mainContent');
  if      (currentTab === '__summary__') el.innerHTML = renderSummary();
  else if (currentTab === '__admin__')   el.innerHTML = renderAdmin();
  else                                   el.innerHTML = renderStore(currentTab);
  if (currentTab === '__summary__') setTimeout(showScrollHintIfMobile, 0);
}

function getMasterOrder() {
  const catOrder = Object.keys(masterProducts);
  const catProds = {};
  catOrder.forEach(cat => { catProds[cat] = masterProducts[cat] || []; });
  return { catOrder, catProds };
}

function getSortedStoreProds(sid) {
  const result = {};
  Object.entries(masterProducts).forEach(([cat, prods]) => {
    const visible = prods.filter(p => !isDisabled(sid, p));
    if (visible.length > 0) result[cat] = visible;
  });
  return result;
}

// ══════════════════════════════════════════════
//  SUMMARY — 총 확인 탭 (항상 어제 날짜)
// ══════════════════════════════════════════════
let summaryShowAll = true;

function renderSummary() {
  const { catOrder, catProds } = getMasterOrder();
  const colCount = stores.length + 2;

  // 어제 날짜 라벨
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate() - 1);
  const yLabel = yesterday.toISOString().slice(0, 10);
  const yDate = new Date(yLabel + 'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  const yLabelKr = `${yDate.getMonth()+1}월 ${yDate.getDate()}일 (${days[yDate.getDay()]})`;

  let thead = `<tr>
    <th>품목</th>
    ${stores.map(s => `<th>${s.label}</th>`).join('')}
    <th class="th-total">총합</th>
  </tr>`;

  let tbody = '';
  catOrder.forEach(cat => {
    const catRows = [];
    (catProds[cat] || []).forEach(p => {
      const qs = stores.map(s => getQ(s.id, p));
      const total = qs.reduce((a,b)=>a+b,0);
      if (!summaryShowAll && total === 0) return;
      const allDisabled = stores.every(s => isDisabled(s.id, p));

      catRows.push(`<tr class="${allDisabled ? 'row-disabled' : ''}" data-prod="${escAttr(p)}">
        <td>${p}${allDisabled ? ' <span style="font-size:10px;color:#bbb">(판매안함)</span>' : ''}</td>
        ${qs.map((q, i) => {
          const dis = isDisabled(stores[i].id, p);
          return `<td class="${q>0?'cell-has':'cell-zero'}" data-sid="${stores[i].id}" data-prev="${q}"${dis?' style="text-decoration:line-through;opacity:0.4"':''}>${q>0?q:'-'}</td>`;
        }).join('')}
        <td class="cell-total">${total>0?total:'-'}</td>
      </tr>`);
    });
    if (catRows.length > 0) {
      tbody += `<tr class="cat-row" data-cat="${escAttr(cat)}" onclick="toggleCat(this)"><td colspan="${colCount}">📂 ${cat} <span class="cat-toggle">▼</span></td></tr>`;
      tbody += catRows.join('');
    }
  });

  if (!tbody) tbody = `<tr><td colspan="${colCount}" style="text-align:center;padding:30px;color:var(--text-dim);font-size:13px">아직 수량이 입력된 품목이 없습니다.<br><small style="margin-top:6px;display:block">"품목 전체 보기"를 켜면 수량이 없어도 모든 품목이 표시됩니다.</small></td></tr>`;

  const resetButtons = stores.map(s =>
    `<button class="btn btn-danger" onclick="resetStore('${s.id}','${esc(s.label)}')" style="min-height:36px">🗑 ${s.label}</button>`
  ).join('');

  return `
    <div class="summary-card">
      <div>
        <h2>📋 총 발주 확인</h2>
        <p>📅 ${yLabelKr} 발주 현황 (전날 발주표)</p>
      </div>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <label style="display:flex;align-items:center;gap:7px;cursor:pointer;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;white-space:nowrap;color:#fff">
          <input type="checkbox" id="summaryShowAllChk" ${summaryShowAll?'checked':''} onchange="summaryShowAll=this.checked;renderMain()" style="width:14px;height:14px;cursor:pointer;accent-color:#3b5bdb">
          품목 전체 보기
        </label>
        <div class="live-badge"><span class="live-dot"></span>실시간</div>
      </div>
    </div>
    <div style="background:#fff5f5;border:1.5px solid #ffc9c9;border-radius:10px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;flex-wrap:wrap;gap:10px;">
      <div style="font-size:12px;font-weight:700;color:#c92a2a;white-space:nowrap;flex-shrink:0">🗑 점포별 수동 초기화</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">${resetButtons}</div>
    </div>
    <div class="notice-bar">🔒 이 탭은 읽기 전용입니다. 수량 입력은 각 점포 탭 → <strong>발주 제출</strong> 버튼으로 반영하세요.${summaryShowAll?' <strong>· 전체 품목 표시 중</strong>':''} <span id="scrollHint" style="display:none"> · 👈 좌우로 스크롤</span></div>
    <div class="table-wrap">
      <table class="order-table">
        <thead>${thead}</thead>
        <tbody id="summaryTbody">${tbody}</tbody>
      </table>
    </div>
  `;
}

function escAttr(s) { return s.replace(/"/g, '&quot;'); }

function toggleCat(catRow) {
  catRow.classList.toggle('collapsed');
  const collapsed = catRow.classList.contains('collapsed');
  let sibling = catRow.nextElementSibling;
  while (sibling && !sibling.classList.contains('cat-row')) {
    sibling.classList.toggle('cat-hidden', collapsed);
    sibling = sibling.nextElementSibling;
  }
}

// ══════════════════════════════════════════════
//  STORE INPUT — 점포 탭 (오늘 날짜)
// ══════════════════════════════════════════════
function renderStore(sid) {
  const store = stores.find(s => s.id === sid);
  if (!store) return '<p style="padding:20px">점포를 찾을 수 없습니다.</p>';
  const dateVal = document.getElementById('globalDate').value;
  const sortedProds = getSortedStoreProds(sid);

  if (!draft[sid]) draft[sid] = {};

  let rows = '';
  Object.entries(sortedProds).forEach(([cat, prods]) => {
    rows += `<tr class="cat-row" onclick="toggleCat(this)"><td colspan="2">📂 ${cat} <span class="cat-toggle">▼</span></td></tr>`;
    prods.forEach(p => {
      const k = safeKey(p);
      const q = (draft[sid] && k in draft[sid]) ? draft[sid][k] : (qty[sid]?.[k] ?? 0);
      rows += `<tr>
        <td>${p}</td>
        <td><input type="number" class="num-input" min="0" step="1"
          value="${q||''}" placeholder="0"
          data-sid="${sid}" data-prod="${escAttr(p)}"
          oninput="onQtyInput(this,'${sid}',${JSON.stringify(p)})"
          onfocus="this.select()"></td>
      </tr>`;
    });
  });

  const pendingCount = countPending(sid);

  return `
    <div class="store-card">
      <div>
        <div class="store-name">🏪 ${store.label}</div>
        <div style="font-size:12px;color:var(--text-dim);margin-top:3px">수량 입력 후 아래 <strong>발주 제출</strong> 버튼을 눌러야 총 확인에 반영됩니다</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <span style="font-size:12px;color:var(--text-dim);font-weight:600">📅 ${dateVal}</span>
        <button class="btn btn-danger" onclick="clearDraft('${sid}')" style="min-height:36px">🗑 초기화</button>
      </div>
    </div>
    <div class="notice-bar" id="draftNotice">✏️ 수량을 입력하고 아래 <strong>발주 제출</strong> 버튼을 눌러주세요. 제출 전까지는 총 확인에 반영되지 않습니다.</div>
    <div class="table-wrap">
      <table class="order-table store-table" style="min-width:280px">
        <thead><tr>
          <th style="text-align:left;padding-left:16px;min-width:150px">품목</th>
          <th style="min-width:100px">수량</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="submit-bar" id="submitBar">
      <div>
        <div class="sb-title" id="sbTitle">${pendingCount > 0 ? `✏️ ${pendingCount}개 품목 수정됨` : '✅ 제출 완료 상태'}</div>
        <div class="sb-desc">제출하면 총 확인 탭에 즉시 반영됩니다</div>
      </div>
      <button class="btn btn-submit" id="submitBtn" onclick="submitStore('${sid}')">
        📤 발주 제출
      </button>
    </div>`;
}

function countPending(sid) {
  const d = draft[sid] || {};
  const q = qty[sid] || {};
  let count = 0;
  Object.keys(d).forEach(k => {
    const dv = d[k] ?? 0;
    const qv = q[k] ?? 0;
    if (dv !== qv) count++;
  });
  return count;
}

function updateSubmitBar(sid) {
  const titleEl = document.getElementById('sbTitle');
  if (!titleEl) return;
  const count = countPending(sid);
  titleEl.textContent = count > 0 ? `✏️ ${count}개 품목 수정됨` : '✅ 제출 완료 상태';
  const btn = document.getElementById('submitBtn');
  if (btn) {
    btn.style.opacity = count > 0 ? '1' : '0.5';
    btn.style.transform = count > 0 ? '' : 'none';
  }
}

function onQtyInput(inp, sid, p) {
  setDraft(sid, p, inp.value);
}

function submitStore(sid) {
  const store = stores.find(s => s.id === sid);
  const btn = document.getElementById('submitBtn');
  if (btn) { btn.textContent = '⏳ 제출 중...'; btn.disabled = true; }

  fbSubmitStore(sid).then(() => {
    draft[sid] = {};
    toast(`✅ ${store.label} 발주 제출 완료! 총 확인에 반영됐습니다`, 'success');
    const titleEl = document.getElementById('sbTitle');
    if (titleEl) titleEl.textContent = '✅ 제출 완료 상태';
    if (btn) { btn.textContent = '📤 발주 제출'; btn.disabled = false; }
  }).catch(() => {
    toast('⚠️ 제출 실패 — 네트워크를 확인해주세요', 'error');
    if (btn) { btn.textContent = '📤 발주 제출'; btn.disabled = false; }
  });
}

function clearDraft(sid) {
  const s = stores.find(s=>s.id===sid);
  if (!confirm(`${s.label}의 모든 수량을 초기화할까요?\n(제출된 수량도 삭제됩니다)`)) return;
  draft[sid] = {};
  qtyRef().child(sid).remove();
  renderMain();
  toast(`🗑 ${s.label} 초기화 완료`, 'success');
}

// 총 확인 탭에서 특정 점포 수량 초기화
function resetStore(sid, label) {
  if (!confirm(`"${label}"의 모든 발주 수량을 초기화할까요?\n(제출된 수량이 삭제됩니다)`)) return;
  draft[sid] = {};
  qtyRef().child(sid).remove().then(() => {
    toast(`🗑 ${label} 수량 초기화 완료`, 'success');
  }).catch(() => {
    toast('⚠️ 초기화 실패 — 네트워크를 확인해주세요', 'error');
  });
}

  const disStoreOpts = stores.map(s=>`<option value="${s.id}" ${s.id===selDisSid?'selected':''}>${s.label}</option>`).join('');

        <input type="text" class="text-input" id="newStoreIn" placeholder="새 점포명 (예: 세종점)" onkeydown="if(event.key==='Enter')addStore()">

    <div class="admin-section">
      <h3>📋 총 확인 기준 품목 관리 <span style="font-size:10px;font-weight:400;color:var(--text-dim);margin-left:4px">여기서 설정한 순서가 총 확인에 반영됩니다</span></h3>
      <div style="font-size:12px;color:#7950f2;background:#f3f0ff;border-radius:8px;padding:9px 13px;margin-bottom:14px;font-weight:600">
        💡 카테고리와 품목을 직접 추가/삭제/드래그 정렬하세요. 이 목록이 총 확인의 기준이 됩니다.

      <div style="margin-bottom:16px">

          ${Object.keys(masterProducts).length ? Object.keys(masterProducts).map((c,i,arr)=>`
            <div class="drag-item" draggable="true"
              ondragstart="onMasterCatDragStart(event,${i})"

          💾 저장
        </button>
      </div>

}

function esc(s) { return s.replace(/'/g,"\\'"); }

function addStore() {
  const label = document.getElementById('newStoreIn').value.trim();
  if (!label) return;
  if (stores.find(s=>s.label===label)) { toast('⚠️ 이미 존재하는 점포입니다','error'); return; }
  const id = 'st_'+Date.now();
  stores.push({id, label});
  products[id] = {};
  document.getElementById('newStoreIn').value = '';
  buildTabs(); renderMain();
  toast(`✅ "${label}" 점포 추가됨`,'success');
}

function delStore(i) {
  const s = stores[i];
  if (!confirm(`"${s.label}" 점포와 모든 품목을 삭제할까요?`)) return;
  stores.splice(i,1);
  delete products[s.id]; delete qty[s.id];
  if (currentTab===s.id) currentTab='__summary__';
  buildTabs(); renderMain();
  toast(`🗑 "${s.label}" 삭제됨`,'success');
}

function saveAdmin() {
  const disabledRaw = {};
  Object.entries(disabled).forEach(([sid, obj]) => {
    disabledRaw[sid] = Object.keys(obj).filter(p => obj[p]);
  });

  const masterCatOrder = Object.keys(masterProducts);
  const masterProds = {};
  masterCatOrder.forEach(cat => { masterProds[cat] = masterProducts[cat]; });

  db.ref('config').set({
    stores, products, masterCatOrder, masterProds, disabled: disabledRaw
  }).then(() => {
    toast('✅ 저장 완료! 모든 기기에 즉시 반영됩니다 🔄', 'success');
  }).catch(() => {
    toast('⚠️ 저장 실패 — 네트워크를 확인해주세요', 'error');
  });
}

let dragSrcIdx = null;
let catDragSrcIdx = null;
let masterCatDragIdx = null;
let masterProdDragIdx = null;

function onDragOver(e) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDragEnd() {
  dragSrcIdx = catDragSrcIdx = masterCatDragIdx = masterProdDragIdx = null;
  document.querySelectorAll('.drag-item').forEach(el => el.classList.remove('dragging','drag-over'));
}

function onMasterCatDragStart(e,idx) { masterCatDragIdx=idx; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function onMasterCatDrop(e,targetIdx) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if (masterCatDragIdx===null||masterCatDragIdx===targetIdx) return;
  const cats=Object.keys(masterProducts);
  const [moved]=cats.splice(masterCatDragIdx,1);
  cats.splice(targetIdx,0,moved);
  const reordered={};
  cats.forEach(c=>{reordered[c]=masterProducts[c];});
  masterProducts=reordered;
  masterCatDragIdx=null;
  renderMain();
}

function onMasterProdDragStart(e,idx) { masterProdDragIdx=idx; e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function onMasterProdDrop(e,targetIdx,cat) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if (masterProdDragIdx===null||masterProdDragIdx===targetIdx) return;
  const arr=masterProducts[cat];
  const [moved]=arr.splice(masterProdDragIdx,1);
  arr.splice(targetIdx,0,moved);
  masterProdDragIdx=null;
  renderMain();
}

// ══════════════════════════════════════════════
//  마스터 품목 관리
// ══════════════════════════════════════════════
function toggleDisabled(sid, p, checked) {
  if (!disabled[sid]) disabled[sid] = {};
  if (checked) disabled[sid][p] = true;
  else delete disabled[sid][p];
  const lbl = event.target.closest('label');
  if (lbl) {
    lbl.style.border = checked ? '1.5px solid #ffc9c9' : '1.5px solid var(--border)';
    lbl.style.background = checked ? '#fff5f5' : 'var(--surface2)';
    const nameSpan = lbl.querySelector('span:nth-child(2)');
    if (nameSpan) { nameSpan.style.color = checked?'#e03131':'var(--text)'; nameSpan.style.fontWeight = checked?'700':'500'; }
    let badge = lbl.querySelector('.dis-badge');
    if (checked && !badge) {
      badge = document.createElement('span');
      badge.className = 'dis-badge';
      badge.style.cssText = 'font-size:11px;color:#e03131;font-weight:700';
      badge.textContent = '판매 안함';
      lbl.appendChild(badge);
    } else if (!checked && badge) badge.remove();
  }
}

function addMasterCat() {
  const cat = document.getElementById('newMasterCatIn')?.value.trim();
  if (!cat) return;
  if (masterProducts[cat]) { toast('⚠️ 이미 있는 카테고리입니다','error'); return; }
  masterProducts[cat] = [];
  document.getElementById('newMasterCatIn').value = '';
  renderMain();
  toast(`✅ 카테고리 "${cat}" 추가됨`,'success');
}

function delMasterCat(cat) {
  if (!confirm(`"${cat}" 카테고리와 모든 품목을 삭제할까요?`)) return;
  delete masterProducts[cat];
  renderMain();
  toast(`🗑 "${cat}" 삭제됨`,'success');
}

function addMasterProd() {
  const cat = document.getElementById('aMasterCat')?.value;
  const p   = document.getElementById('newMasterProdIn')?.value.trim();
  if (!p||!cat) { toast('⚠️ 카테고리와 품목명을 입력하세요','error'); return; }
  if (!masterProducts[cat]) masterProducts[cat] = [];
  if (masterProducts[cat].includes(p)) { toast('⚠️ 이미 있는 품목입니다','error'); return; }
  masterProducts[cat].push(p);
  document.getElementById('newMasterProdIn').value = '';
  renderMain();
  toast(`✅ "${p}" 추가됨`,'success');
}

function delMasterProd(cat, i) {
  const p = masterProducts[cat][i];
  masterProducts[cat].splice(i,1);
  renderMain();
  toast(`🗑 "${p}" 삭제됨`,'success');
}

// ══════════════════════════════════════════════
//  확인 & 초기화
// ══════════════════════════════════════════════
function confirmReset(team) {
  const label = team==='cake'?'케익팀':'포장실';
  const scope = team==='cake'?'케익 카테고리 수량':'케익 외 나머지 수량';
  if (!confirm(`${label} 확인 완료 처리할까요?\n${scope}이 초기화됩니다.`)) return;
  const targetCats = Object.keys(masterProducts).filter(cat =>
    team==='cake' ? cat==='케익' : cat!=='케익'
  );
  stores.forEach(s => {
    if (!draft[s.id]) return;
    targetCats.forEach(cat => {
      (masterProducts[cat] || []).forEach(p => { delete draft[s.id][safeKey(p)]; });
    });
  });
  fbResetQtyByCategories(targetCats);
  toast(team==='cake'?'✅ 케익팀 확인 완료! 케익 수량 초기화됐습니다':'✅ 포장실 확인 완료! 나머지 수량 초기화됐습니다','success');
}

// ══════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════
function toast(msg, type='success') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className=`toast ${type}`; el.textContent=msg;
  wrap.appendChild(el);
  setTimeout(()=>el.remove(), 3000);
}

function showScrollHintIfMobile() {
  const hint = document.getElementById('scrollHint');
  if (hint && window.innerWidth <= 600) hint.style.display = 'inline';
}

init();
</script>
